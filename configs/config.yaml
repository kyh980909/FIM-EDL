defaults:
  - _self_
  - experiment: info_edl

seed: 0
checkpoint: ""

experiment:
  name: info_edl
  suite: cifar_ood
  method_variant: info_edl
  wandb_tags: []

model:
  backbone: resnet18
  head: edl
  num_classes: 10
  pretrained: false
  evidence_fn: softplus

loss:
  name: info_edl
  lambda_value: 1.0
  beta: 1.0
  gamma: 1.0
  lambda_kl: 1.0
  lambda_logdet: 0.01
  info_type: fisher
  gate_type: exp
  detach_weight: false
  objective: risk_plus_kl

score:
  name: vacuity

eval:
  scores: [maxp, alpha0, vacuity]
  calibration: none
  temperature: 1.0

data:
  root: ./data
  id: cifar10
  ood_list: [svhn, cifar100]
  batch_size: 128
  num_workers: 2

fewshot:
  enabled: false
  way: 5
  shot: 1
  episodes: 1000
  ood_dataset: cub

optimizer:
  name: adam
  lr: 0.001
  momentum: 0.9
  weight_decay: 0.0

scheduler:
  name: none
  warmup_epochs: 0

trainer:
  max_epochs: 100
  accelerator: auto
  devices: 1
  precision: 16-mixed
  log_every_n_steps: 50

logging:
  backend: wandb
  local_dir: runs
  wandb:
    project: info-edl-extend
    mode: online
    tags: [info-edl, repro]
