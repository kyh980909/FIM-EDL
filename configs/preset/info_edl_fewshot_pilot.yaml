methods: [info_edl]
seeds: [0]
run_eval: true
build_artifacts: true
overrides:
  - experiment.suite=fewshot_paper
  - model.backbone=wrn28_10
  - model.num_classes=100
  - data.id=miniimagenet
  - data.ood_list=[cub]
  - data.batch_size=16
  - data.num_workers=0
  - trainer.max_epochs=3
  - trainer.accelerator=cpu
  - trainer.precision=32
  - logging.backend=csv
  - fewshot.enabled=true
  - fewshot.eval_split=test
  - fewshot.way=5
  - fewshot.shot=1
  - fewshot.episodes=100
  - fewshot.adapt_steps=50
  - fewshot.adapt_lr=0.01
