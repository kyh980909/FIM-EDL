name: plugin-gate

on:
  pull_request:
  push:
    branches: [ master, main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - uses: astral-sh/setup-uv@v6
      - run: uv sync --extra dev
      - run: uv run pytest tests/templates -q
